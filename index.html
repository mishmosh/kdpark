
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friends of Karen Donnelly Park</title>
  <meta name="description" content="Karen Donnelly Park is a small but special green space in the heart of Pennsport, South Philadelphia.">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    /* Only override what's needed for mobile responsiveness —
       all colors, fonts, sizes, and table styles come from Google Docs */
    main * { max-width: 100% !important; }
    main div, main p, main span, main section { width: auto !important; }
    main img { display: block; width: 100% !important; height: auto !important; }

    /* Loading / error states */
    .status { text-align: center; padding: 4rem 1rem; color: #777; }
    .status a { color: #555; font-weight: 600; }
  </style>
</head>
<body>

  <main id="content">
    <div class="status">Loading&hellip;</div>
  </main>

  <script>
    const PUB_URL = 'https://docs.google.com/document/d/e/2PACX-1vRTSAwtaZt2blbn-Qp0hTO8i8x0SvRe4TvaAA5qpyRQa0kSbs0vMC7EskBrXQwUWq9N734T0ZHuynPF/pub';

    const PROXIES = [
      url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    ];

    function injectGoogleStyles(fetchedDoc) {
      // Pull Google's <style> blocks out of the fetched <head> and add them to ours
      // so colours, fonts, and table styles all come through correctly
      fetchedDoc.querySelectorAll('head style').forEach(s => {
        const tag = document.createElement('style');
        tag.textContent = s.textContent;
        document.head.appendChild(tag);
      });
    }

    function removeGoogleChrome(root) {
      // Remove only the two Google-added header bars:
      // "Published using Google Docs" and the doc-title / "updated every 5 min" line
      root.querySelectorAll('#header, #footer, #banners').forEach(el => el.remove());
      // Also remove any inline <script> tags from the fetched content
      root.querySelectorAll('script').forEach(el => el.remove());
      return root;
    }

    async function fetchViaProxy(proxyFn, targetUrl) {
      const proxyUrl = proxyFn(targetUrl);
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        const json = await res.json();
        return json.contents;
      }
      return res.text();
    }

    async function loadContent() {
      const main = document.getElementById('content');
      let lastError;

      for (const proxyFn of PROXIES) {
        try {
          const html = await fetchViaProxy(proxyFn, PUB_URL);
          const parser = new DOMParser();
          const fetchedDoc = parser.parseFromString(html, 'text/html');

          injectGoogleStyles(fetchedDoc);

          const body = fetchedDoc.querySelector('#contents') || fetchedDoc.body;
          if (!body) throw new Error('Content element not found');

          removeGoogleChrome(body);
          main.innerHTML = body.innerHTML;
          return;
        } catch (err) {
          lastError = err;
          console.warn('Proxy failed, trying next…', err);
        }
      }

      console.error('All proxies failed:', lastError);
      main.innerHTML = `
        <div class="status">
          <p>Couldn't load page content right now.</p>
          <p><a href="${PUB_URL}" target="_blank">View the Google Doc directly &rarr;</a></p>
          <p style="font-size:0.85em;margin-top:1em;color:#aaa;">
            If you just published the doc, wait a minute and refresh.
          </p>
        </div>`;
    }

    loadContent();
  </script>

</body>
</html>
